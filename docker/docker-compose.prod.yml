services:
  dashboard:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  hermes:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nanoclaw:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: "4.0"

  caddy:
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
