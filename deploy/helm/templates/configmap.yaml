apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "durandal.fullname" . }}-config
  labels:
    {{- include "durandal.labels" . | nindent 4 }}
data:
  # Dashboard
  {{- if .Values.cloudSQL.enabled }}
  DATABASE_URL: "postgresql://{{ .Values.cloudSQL.user }}@{{ .Values.cloudSQL.host }}:{{ .Values.cloudSQL.port }}/{{ .Values.cloudSQL.database }}"
  {{- else }}
  DATABASE_URL: "file:/data/durandal.db"
  {{- end }}
  HERMES_URL: "http://{{ include "durandal.fullname" . }}-hermes:{{ .Values.hermes.port }}"
  NANOCLAW_URL: "http://{{ include "durandal.fullname" . }}-nanoclaw:{{ .Values.nanoclaw.port }}"
  # Hermes
  OLLAMA_HOST: {{ if .Values.ollama.enabled }}"http://{{ include "durandal.fullname" . }}-ollama:{{ .Values.ollama.port }}"{{ else }}""{{ end }}
  HERMES_DATA: "/data/hermes"
  API_SERVER_ENABLED: "true"
  API_SERVER_PORT: {{ .Values.hermes.port | quote }}
  API_SERVER_HOST: "0.0.0.0"
  # NanoClaw
  DURANDAL_MODE: "executor"
  DURANDAL_API_PORT: {{ .Values.nanoclaw.port | quote }}
